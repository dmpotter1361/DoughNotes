<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="DoughNotes">
  <rect width="64" height="64" rx="14" fill="#4a3526"/>
  <!-- recipe note card -->
  <g transform="rotate(-8 32 35)">
    <rect x="17" y="22" width="30" height="29" rx="3.5" fill="#faf3e7"/>
    <line x1="23" y1="32" x2="41" y2="32" stroke="#c8842a" stroke-width="2.6" stroke-linecap="round"/>
    <line x1="23" y1="38" x2="41" y2="38" stroke="#d9b06a" stroke-width="2.6" stroke-linecap="round"/>
    <line x1="23" y1="44" x2="34" y2="44" stroke="#d9b06a" stroke-width="2.6" stroke-linecap="round"/>
  </g>
  <!-- rolling pin -->
  <g transform="rotate(-20 32 18)">
    <rect x="14" y="13" width="36" height="9" rx="4.5" fill="#c9a84c"/>
    <rect x="7" y="16" width="9" height="3" rx="1.5" fill="#a8691c"/>
    <rect x="48" y="16" width="9" height="3" rx="1.5" fill="#a8691c"/>
  </g>
</svg>
