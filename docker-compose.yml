services:
  app:
    build: .
    ports:
      - "3500:3500"
    environment:
      - PORT=3500
      - NODE_ENV=production
      - DATA_DIR=/data
      # Set JWT_SECRET in a .env file next to this compose file (see .env.example).
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in your .env file}
      # Leave false for plain HTTP. Set COOKIE_SECURE=true in .env once you put
      # the app behind HTTPS (e.g. a reverse proxy), or logins will break over HTTP.
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      # Public base URL — builds the Google OAuth redirect URI + Drive links.
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3500}
      # Google Drive integration (optional). Leave blank to disable.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - doughnotes-data:/data
    restart: unless-stopped

volumes:
  doughnotes-data:
