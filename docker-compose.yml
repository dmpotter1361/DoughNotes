services:
  app:
    build: .
    ports:
      - "3500:3500"
    environment:
      - PORT=3500
      - NODE_ENV=production
      - DATA_DIR=/data
      # Set JWT_SECRET in a .env file next to this compose file (see .env.example).
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in your .env file}
      # Leave false for plain HTTP. Set COOKIE_SECURE=true in .env once you put
      # the app behind HTTPS (e.g. the caddy profile below), or logins break over HTTP.
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      # Public base URL — builds the Google OAuth redirect URI + Drive links.
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3500}
      # Google Drive integration (optional). Leave blank to disable.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # Optional AI extraction. Gemini (hosted) needs no extra service; Ollama (local)
      # uses the llm-profile service below.
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
      - OLLAMA_URL=${OLLAMA_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
    volumes:
      - doughnotes-data:/data
    restart: unless-stopped

  # Optional HTTPS front door. Enable with:  docker compose --profile https up -d
  # Requires DOMAIN set in .env and ports 80/443 reachable from the internet.
  # Also set COOKIE_SECURE=true and APP_BASE_URL=https://<DOMAIN> in .env.
  caddy:
    image: caddy:2
    profiles: ["https"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:?set DOMAIN in your .env file to use the https profile}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped

  # Optional local AI model for recipe extraction. Enable with:
  #   docker compose --profile llm up -d
  # then pull a model once:
  #   docker compose --profile llm exec ollama ollama pull llama3.2:3b
  # and set OLLAMA_URL=http://ollama:11434 in your .env.
  ollama:
    image: ollama/ollama
    profiles: ["llm"]
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

volumes:
  doughnotes-data:
  caddy-data:
  caddy-config:
  ollama-models:
